name: Simple CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run a simple command
        run: echo "GitHub Actions."

      - name: Step 1
        run: echo "This is step 1."

      - name: Step 2
        run: echo "This is step 2."

      - name: Step 3
        run: echo "This is step 3."

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Docker Build
        run: docker build -t ghcr.io/${{ github.actor }}/devops:v1 .

      - name: Docker Push
        run: docker push ghcr.io/${{ github.actor }}/devops:v1